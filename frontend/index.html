<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Persistent Notes</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>
    <div class="container glass-panel">
        <header>
            <h1>My Persistent Notes</h1>
            <p>Save your thoughts beautifully.</p>
        </header>
        
        <div class="tabs">
            <button class="tab-btn active" id="tabAdd">📝 Add Note</button>
            <button class="tab-btn" id="tabSearch">🔍 Search Notes</button>
        </div>

        <main>
            <div id="addSection" class="tab-content active">
                <div class="input-section">
                    <input type="text" id="noteTitle" placeholder="Note Title..." autocomplete="off">
                    <textarea id="noteInput" placeholder="Type your note here..." rows="4"></textarea>
                    <button id="addBtn">
                        <span class="btn-text">Add Note</span>
                    </button>
                </div>
            </div>

            <div id="searchSection" class="tab-content hidden">
                <div class="search-section">
                    <input type="text" id="searchInput" placeholder="Search your notes..." autocomplete="off">
                </div>
            </div>

            <div id="error" class="error-msg hidden"></div>
            
            <ul id="notesList" class="notes-list">
                <!-- Notes will be injected here -->
            </ul>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
